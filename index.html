<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0c10" />
    <title>FluxRun — Racing</title>
  </head>
  <body>
    <main id="app">
      <canvas id="game-canvas" aria-label="FluxRun racing game canvas"></canvas>

      <section id="race-hud" aria-live="polite">
        <header id="hud-header">
          <div class="hud-pill position-pill">
            <span>POS</span>
            <strong id="phase-value">1/4</strong>
          </div>
          <div id="sector-label" class="hud-track-name">TRACK</div>
          <div class="hud-pill lap-pill">
            <span>LAP</span>
            <strong id="route-value">1/3</strong>
          </div>
        </header>

        <div id="status-line" class="hud-toast">准备发车</div>

        <footer id="dash-hud">
          <div id="minimap-panel" class="dash-card">
            <canvas id="minimap" width="168" height="168" aria-label="赛道小地图"></canvas>
          </div>
          <div id="hud-center-stats">
            <div class="stat-chip"><span>天气</span><strong id="energy-value">CLEAR</strong></div>
            <div class="stat-chip"><span>最佳圈</span><strong id="health-value">--:--</strong></div>
            <div class="stat-chip wide"><span>本圈</span><strong id="score-value">00:00.00</strong></div>
          </div>
          <div id="speedometer-panel" class="dash-card">
            <div id="speedometer"></div>
            <strong id="combo-value" class="speed-digital">000</strong>
          </div>
        </footer>

        <button id="mute-action" class="hud-icon-btn" type="button" data-action="mute" aria-label="静音">SND</button>
      </section>

      <div id="touch-controls" aria-hidden="true">
        <div id="touch-stick"><div id="touch-knob"></div></div>
        <div id="touch-actions">
          <button type="button" data-action="restart">RST</button>
          <button type="button" data-action="camera">CAM</button>
        </div>
        <button id="boost-button" type="button">BOOST</button>
      </div>

      <div id="race-start-overlay" class="hidden" aria-live="polite">
        <div id="ready-panel">
          <p class="ready-kicker">FLUXRUN GRAND PRIX</p>
          <h2 id="ready-title">READY?</h2>
          <p id="ready-track-name">Track</p>
          <button id="go-button" type="button">GO</button>
          <p class="ready-hint">W 油门 · S 刹车/倒车 · V 视角 · Shift 加速</p>
        </div>
        <div id="lights-panel" class="hidden" aria-label="发车信号灯">
          <div class="start-light red"></div>
          <div class="start-light red"></div>
          <div class="start-light red"></div>
        </div>
        <div id="countdown-digit" class="hidden"></div>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
